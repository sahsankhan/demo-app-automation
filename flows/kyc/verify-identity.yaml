# @BANK-201 Standalone KYC test — page → steps
url: ${BASE_URL}
---
- runFlow:
    file: ../shared/go-to-page.yaml
    env:
      BASE_URL: ${BASE_URL}
      PAGE_URL: ${BASE_URL}/kyc.html
      PAGE_ASSERT: "Identity verification"

- runFlow:
    file: verify-steps.yaml
    env:
      BASE_URL: ${BASE_URL}
      DATE_OF_BIRTH: ${DATE_OF_BIRTH}
      NATIONAL_ID: ${NATIONAL_ID}
      ADDRESS: ${ADDRESS}
      CITY: ${CITY}
      COUNTRY_LABEL: ${COUNTRY_LABEL}
      DOCUMENT_LABEL: ${DOCUMENT_LABEL}
