# @BANK-301 Standalone account test — page → steps
url: ${BASE_URL}
---
- runFlow:
    file: ../shared/go-to-page.yaml
    env:
      BASE_URL: ${BASE_URL}
      PAGE_URL: ${BASE_URL}/account.html
      PAGE_ASSERT: "Open your account"

- runFlow:
    file: setup-steps.yaml
    env:
      BASE_URL: ${BASE_URL}
      ACCOUNT_TYPE_LABEL: ${ACCOUNT_TYPE_LABEL}
      CURRENCY: ${CURRENCY}
      INITIAL_DEPOSIT: ${INITIAL_DEPOSIT}
