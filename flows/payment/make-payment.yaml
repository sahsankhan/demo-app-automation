# @BANK-401 Standalone payment test — page → steps
url: ${BASE_URL}
---
- runFlow:
    file: ../shared/go-to-page.yaml
    env:
      BASE_URL: ${BASE_URL}
      PAGE_URL: ${BASE_URL}/payment.html
      PAGE_ASSERT: "Make a payment"

- runFlow:
    file: make-payment-steps.yaml
    env:
      BASE_URL: ${BASE_URL}
      BENEFICIARY: ${BENEFICIARY}
      BENEFICIARY_ACCOUNT: ${BENEFICIARY_ACCOUNT}
      PAYMENT_AMOUNT: ${PAYMENT_AMOUNT}
      PAYMENT_REFERENCE: ${PAYMENT_REFERENCE}
