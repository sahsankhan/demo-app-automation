# @BANK-101 Standalone onboarding test — page → steps
url: ${BASE_URL}
---
- runFlow:
    file: ../shared/go-to-page.yaml
    env:
      BASE_URL: ${BASE_URL}
      PAGE_URL: ${BASE_URL}/onboarding.html
      PAGE_ASSERT: "Create your account"

- runFlow:
    file: register-steps.yaml
    env:
      BASE_URL: ${BASE_URL}
      FIRST_NAME: ${FIRST_NAME}
      LAST_NAME: ${LAST_NAME}
      EMAIL: ${EMAIL}
      PHONE: ${PHONE}
      PASSWORD: ${PASSWORD}
