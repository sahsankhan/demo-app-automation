# @BANK-500 Full banking E2E — feature → steps → pages (single navigation path)
url: ${BASE_URL}
---
# Home
- runFlow:
    file: ../shared/go-to-page.yaml
    env:
      BASE_URL: ${BASE_URL}
      PAGE_URL: ${BASE_URL}/
      PAGE_ASSERT: "Welcome to Demo App"

# Onboarding: page → steps → next page
- runFlow:
    file: ../shared/go-to-page.yaml
    env:
      BASE_URL: ${BASE_URL}
      PAGE_URL: ${BASE_URL}/onboarding.html
      PAGE_ASSERT: "Create your account"

- runFlow:
    file: ../onboarding/register-steps.yaml
    env:
      BASE_URL: ${BASE_URL}
      FIRST_NAME: ${FIRST_NAME}
      LAST_NAME: ${LAST_NAME}
      EMAIL: ${EMAIL}
      PHONE: ${PHONE}
      PASSWORD: ${PASSWORD}

- runFlow:
    file: ../shared/continue-to-next.yaml
    env:
      BASE_URL: ${BASE_URL}
      SUCCESS_TEXT: "Registration successful"
      CONTINUE_ID: "continue-kyc"

# KYC: steps only (already on kyc.html) → next page
- runFlow:
    file: ../kyc/verify-steps.yaml
    env:
      BASE_URL: ${BASE_URL}
      DATE_OF_BIRTH: ${DATE_OF_BIRTH}
      NATIONAL_ID: ${NATIONAL_ID}
      ADDRESS: ${ADDRESS}
      CITY: ${CITY}
      COUNTRY_LABEL: ${COUNTRY_LABEL}
      DOCUMENT_LABEL: ${DOCUMENT_LABEL}

- runFlow:
    file: ../shared/continue-to-next.yaml
    env:
      BASE_URL: ${BASE_URL}
      SUCCESS_TEXT: "KYC verified"
      CONTINUE_ID: "continue-account"

# Account: steps only → next page
- runFlow:
    file: ../account/setup-steps.yaml
    env:
      BASE_URL: ${BASE_URL}
      ACCOUNT_TYPE_LABEL: ${ACCOUNT_TYPE_LABEL}
      CURRENCY: ${CURRENCY}
      INITIAL_DEPOSIT: ${INITIAL_DEPOSIT}

- runFlow:
    file: ../shared/continue-to-next.yaml
    env:
      BASE_URL: ${BASE_URL}
      SUCCESS_TEXT: "Account opened"
      CONTINUE_ID: "continue-payment"

# Payment: steps only (already on payment.html)
- runFlow:
    file: ../payment/make-payment-steps.yaml
    env:
      BASE_URL: ${BASE_URL}
      BENEFICIARY: ${BENEFICIARY}
      BENEFICIARY_ACCOUNT: ${BENEFICIARY_ACCOUNT}
      PAYMENT_AMOUNT: ${PAYMENT_AMOUNT}
      PAYMENT_REFERENCE: ${PAYMENT_REFERENCE}
