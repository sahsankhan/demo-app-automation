<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onboarding — Demo App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <div class="logo">Demo App</div>
    <span class="step-badge">Step 1 of 4 — Onboarding</span>
  </header>

  <main class="container narrow">
    <h1>Create your account</h1>
    <form id="onboarding-form" class="form">
      <label for="firstName">First name</label>
      <input type="text" id="firstName" name="firstName" placeholder="Jane" required />

      <label for="lastName">Last name</label>
      <input type="text" id="lastName" name="lastName" placeholder="Doe" required />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="jane.doe@example.com" required />

      <label for="phone">Phone</label>
      <input type="tel" id="phone" name="phone" placeholder="+1 555 0100" required />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required />

      <button type="submit" class="btn primary" id="register-btn">Register</button>
    </form>

    <div id="onboarding-success" class="success-panel hidden">
      <h2>Registration successful</h2>
      <p id="welcome-message">Welcome!</p>
      <a class="btn primary" href="kyc.html" id="continue-kyc">Continue to KYC</a>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
