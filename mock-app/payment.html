<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payments — Demo App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <div class="logo">Demo App</div>
    <span class="step-badge">Step 4 of 4 — Payments</span>
  </header>

  <main class="container narrow">
    <h1>Make a payment</h1>

    <div class="balance-card">
      <span>Available balance</span>
      <strong id="available-balance">$0.00</strong>
    </div>

    <form id="payment-form" class="form">
      <label for="beneficiary">Beneficiary name</label>
      <input type="text" id="beneficiary" name="beneficiary" placeholder="John Smith" required />

      <label for="beneficiaryAccount">Beneficiary account</label>
      <input type="text" id="beneficiaryAccount" name="beneficiaryAccount" placeholder="ACC-987654" required />

      <label for="amount">Amount</label>
      <input type="number" id="amount" name="amount" min="0.01" step="0.01" placeholder="25.00" required />

      <label for="reference">Payment reference</label>
      <input type="text" id="reference" name="reference" placeholder="Rent payment" required />

      <button type="submit" class="btn primary" id="submit-payment-btn">Submit Payment</button>
    </form>

    <div id="payment-success" class="success-panel hidden">
      <h2>Payment successful</h2>
      <p>Transaction ID: <strong id="transaction-id">—</strong></p>
      <p>New balance: <strong id="new-balance">—</strong></p>
      <p class="journey-complete">Banking journey complete</p>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
